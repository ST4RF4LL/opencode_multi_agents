finding_requirements:
  mandatory:
    - reachable_external_entry
    - attacker_controlled_input
    - credible_source_to_sink_path
    - response_html_js_or_css_context_is_influenced
    - effective_context_encoding_or_sanitization_missing_or_bypassable
  one_of:
    - dynamic_verification_success
    - complete_static_dataflow_with_clear_output_context_semantics
    - reproducible_behavioral_evidence
  context:
    recommended:
      - authentication_requirement
      - required_role
      - output_context_classification
      - content_type
      - template_engine_if_any
      - affected_component
      - subtype_classification
      - stored_vs_reflected

reject_when:
  - output_is_constant_with_no_user_influence
  - matching_context_encoding_or_effective_sanitizer_present
  - template_auto_escape_applies_and_no_unescape_path
  - input_only_in_non_html_json_api_without_html_embedding
  - path_is_test_only_or_dead_code
  - evidence_is_only_a_dangerous_api_match

status_definitions:
  Candidate: dangerous pattern found but critical evidence incomplete
  Finding: Evidence Contract satisfied; formal report allowed
  Rejected: confirmed not a vulnerability with recorded reason
