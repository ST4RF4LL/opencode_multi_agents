id: servlet
name: Java Servlet API
detect:
  imports:
    - javax.servlet
    - jakarta.servlet
  keywords:
    - "HttpServlet"
    - "HttpServletRequest"
    - "HttpServletResponse"
    - "getWriter"
    - "PrintWriter"

sources: inherit-global
sinks:
  - servlet-writer-print
  - servlet-response-send

safe_patterns:
  - Encode_forHtml_before_writer_print
  - constant_html_only
  - non_html_content_type_with_safe_serialization

unsafe_patterns:
  - getWriter_print_request_parameter
  - sendError_with_user_message_in_html_error_page
  - content_type_text_html_with_raw_user_data

notes:
  - response.getWriter().print/write is the primary low-level sink
  - Always determine Content-Type and output context before grading controls
