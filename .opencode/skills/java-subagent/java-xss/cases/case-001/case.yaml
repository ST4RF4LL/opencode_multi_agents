id: case-001
vulnerability_type: xss
subtype: reflected-html
source:
  type: request-parameter
  expression: request.getParameter("name")
sink:
  api: PrintWriter.print
  sensitive_argument: 1
propagation:
  - HelloServlet.doGet
root_cause:
  - user_input_concatenated_into_html_response
  - no_context_aware_output_encoding
prerequisites:
  - reachable_http_endpoint
  - response_content_type_html
observed_behavior:
  - attacker_controlled_markup_reflected_in_html_body
fix:
  - Encode.forHtml_before_write
  - or_use_templating_with_auto_escape
