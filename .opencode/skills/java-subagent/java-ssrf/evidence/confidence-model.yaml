levels:
  high:
    requires:
      - clear_source_to_sink_path
      - clear_destination_component_influence
      - missing_or_weak_controls
      - one_of_strong_dynamic_or_unambiguous_static_semantics
  medium:
    requires:
      - source_to_sink_path
      - likely_destination_influence
      - controls_absent_or_suspicious
    missing_optional:
      - dynamic_verification
  low:
    requires:
      - sink_and_possible_input_adjacency
    notes: usually Candidate only

modifiers:
  increase:
    - unauthenticated
    - full_url_control
    - proxy_feature
    - redirects_followed
    - confirmed_collaborator_hit
  decrease:
    - partial_host_allowlist
    - uncertain_reachability
    - path_only_influence
    - open_redirect_noise_without_server_fetch