levels:
  high:
    requires:
      - clear_source_to_sink_path
      - clear_expression_or_capability_influence
      - missing_or_weak_controls
      - one_of_strong_dynamic_or_unambiguous_static_semantics
  medium:
    requires:
      - source_to_sink_path
      - likely_expression_influence
      - controls_absent_or_suspicious
    missing_optional:
      - dynamic_verification
  low:
    requires:
      - sink_and_possible_input_adjacency
    notes: usually Candidate only

modifiers:
  increase:
    - unauthenticated
    - standard_evaluation_context
    - template_user_embed
    - confirmed_evaluation_of_attacker_expression
  decrease:
    - simple_evaluation_context_present
    - partial_allowlist
    - uncertain_reachability
    - constant_value_annotation_noise
