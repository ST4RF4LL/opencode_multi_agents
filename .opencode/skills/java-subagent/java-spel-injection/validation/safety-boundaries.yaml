allowed:
  - read_only_spel_proof_markers_when_possible
  - harmless_property_access_or_literal_evaluation_in_staging
  - boolean_or_result_difference_confirmation_with_minimal_impact
  - use_of_staging_or_authorized_test_environments

forbidden:
  - weaponized_rce_payloads_or_payload_libraries
  - process_execution_file_write_or_reverse_shell_expressions
  - destructive_mutations_in_production_without_explicit_authorization
  - mass_data_exfiltration_beyond_minimal_proof
  - lateral_movement_outside_agreed_scope
  - credential_stuffing_unrelated_to_the_finding

reporting:
  - document_blast_radius_assumptions
  - prefer_screenshots_logs_and_minimal_result_samples
  - describe_impact_abstractly_without_copy_paste_exploit_expressions
