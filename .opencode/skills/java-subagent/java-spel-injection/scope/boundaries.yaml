boundary_notes:
  - OGNL / MVEL / Groovy ScriptEngine belong to future java-expression-injection or separate skills
  - FreeMarker / Velocity SSTI are out of scope; focus SpEL / Spring EL
  - Thymeleaf preprocessing __${}__ is adjacent template EL — note as boundary, not primary sink family
  - Spring Security hasPermission SpEL with constant expression text is often FP; require dynamic expression text
  - SimpleEvaluationContext is a strong control signal but verify no dangerous custom MethodResolver/PropertyAccessor
  - dangerous API hit alone is not a vulnerability
