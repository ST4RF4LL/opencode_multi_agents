case_specific: true
preconditions:
  - endpoint accepts expression query/body parameter
  - application uses vulnerable SpelEvalService path
  - StandardEvaluationContext evaluates parsed expression
request_context:
  endpoint: /api/eval
  parameter: expression
observed_result:
  - attacker-controlled expression text is parsed and evaluated
  - impact: arbitrary expression evaluation with full StandardEvaluationContext capability surface
  - abstract_impact: may enable unauthorized computation or code-level capability abuse depending on context
payload_policy:
  - no_weaponized_rce_expressions_in_this_skill_package
  - use_harmless_lab_markers_only_when_revalidating
reuse_policy:
  - reference_only
  - do_not_execute_without_rederiving_from_current_target
