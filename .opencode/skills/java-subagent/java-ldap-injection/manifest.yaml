id: java-ldap-injection
name: Java LDAP Injection
version: "1.0.0"
language: java
cwe:
  - CWE-90
owasp:
  - A03:2021-Injection
maturity: 3
description: >
  Detect attacker-controlled input reaching LDAP filter or distinguished name (DN)
  construction without effective encoding, parameterized filters, or allowlisting.

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-ldap-sinks.yaml
      - java-ldap-patterns.yaml
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - llm

frameworks_supported:
  - jndi
  - spring-ldap
