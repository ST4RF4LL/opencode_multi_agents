rules:
  - id: java-hardcoded-secretkeyspec
    message: SecretKeySpec constructed from string/byte literal (hardcoded key material)
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: |
              new SecretKeySpec("...".getBytes(...), ...)
          - pattern: |
              new SecretKeySpec("...".getBytes(), ...)
          - pattern: |
              byte[] $K = "...".getBytes(...);
              ...
              new SecretKeySpec($K, ...)
          - pattern: |
              new SecretKeySpec(new byte[] {...}, ...)
    metadata:
      cwe: CWE-321
      subtype: jwt-secret-literal
      confidence: high
      notes: also covers AES/JWT HMAC key material in source

  - id: java-hardcoded-api-key-constant
    message: Hardcoded API key or token constant
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: |
              static final String $N = "AKIA...";
          - pattern: |
              static final String $N = "...";
          - pattern: |
              private static final String $N = "...";
      - metavariable-regex:
          metavariable: $N
          regex: (?i).*(API_?KEY|ACCESS_?KEY|SECRET|TOKEN|AUTH_?TOKEN|CLIENT_?SECRET).*
      - metavariable-regex:
          metavariable: $N
          regex: (?i).*(API_?KEY|ACCESS_?KEY|SECRET|TOKEN|AUTH_?TOKEN|CLIENT_?SECRET).*
    metadata:
      cwe: CWE-798
      subtype: hardcoded-api-key
      confidence: medium
      notes: require non-placeholder value in triage

  - id: java-hardcoded-aws-credentials
    message: AWS static credentials constructed from literals
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          new BasicAWSCredentials("...", "...")
      - pattern: |
          AwsBasicCredentials.create("...", "...")
      - pattern: |
          new BasicAWSCredentials($A, $S)
      - pattern: |
          AwsBasicCredentials.create($A, $S)
    metadata:
      cwe: CWE-798
      subtype: cloud-access-key
      confidence: high

  - id: java-hardcoded-jdbc-password
    message: JDBC connection uses hardcoded password or credentials
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          DriverManager.getConnection("...", "...", "...")
      - pattern: |
          DriverManager.getConnection($URL, $USER, "...")
      - pattern: |
          $DS.setPassword("...")
    metadata:
      cwe: CWE-798
      subtype: db-url-with-password
      confidence: high

  - id: java-hardcoded-jwt-signing-key
    message: JWT signing key/secret from string literal
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          Keys.hmacShaKeyFor("...".getBytes(...))
      - pattern: |
          Keys.hmacShaKeyFor("...".getBytes())
      - pattern: |
          $X.setSigningKey("...")
      - pattern: |
          $X.signWith(..., "...".getBytes(...))
    metadata:
      cwe: CWE-321
      subtype: jwt-secret-literal
      confidence: high

  - id: java-hardcoded-password-assignment
    message: Password field/variable assigned string literal
    severity: WARNING
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: |
              String $P = "...";
          - pattern: |
              $P = "...";
      - metavariable-regex:
          metavariable: $P
          regex: (?i).*(password|passwd|pwd|keystorePassword).*
    metadata:
      cwe: CWE-259
      subtype: hardcoded-password
      confidence: medium
