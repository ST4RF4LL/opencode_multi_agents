rules:
  - id: java-hardcoded-akia-access-key
    message: AWS access key id pattern (AKIA...) in source
    severity: ERROR
    languages: [java]
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    metadata:
      cwe: CWE-798
      subtype: cloud-access-key
      confidence: high
      notes: triage AKIAIOSFODNN7EXAMPLE as docs placeholder

  - id: java-hardcoded-pem-private-key
    message: PEM private key block embedded in source
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern-regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN PRIVATE KEY-----'
    metadata:
      cwe: CWE-321
      subtype: private-key-in-repo
      confidence: high

  - id: java-hardcoded-authorization-bearer
    message: Authorization Bearer/token header built with string literal
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          $H.setHeader("Authorization", "Bearer ...")
      - pattern: |
          $H.setHeader("Authorization", "...")
      - pattern: |
          $H.header("Authorization", "...")
      - pattern: |
          $H.addHeader("X-Api-Key", "...")
      - pattern: |
          $H.set("Authorization", "Bearer " + "...")
    metadata:
      cwe: CWE-798
      subtype: hardcoded-api-key
      confidence: high

  - id: java-hardcoded-basic-auth
    message: Basic auth credentials from string literals
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          "Basic " + Base64.getEncoder().encodeToString(("$USER:" + "...").getBytes(...))
      - pattern: |
          $X + ":" + "..."
    metadata:
      cwe: CWE-259
      subtype: hardcoded-password
      confidence: medium

  - id: java-hardcoded-keystore-password
    message: KeyStore load/getKey with password literal
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          $KS.load($IN, "...".toCharArray())
      - pattern: |
          $KS.load($IN, $PWD)
      - pattern: |
          $KS.getKey($ALIAS, "...".toCharArray())
    metadata:
      cwe: CWE-259
      subtype: hardcoded-password
      confidence: medium
      notes: elevate when $PWD is string/char literal

  - id: java-hardcoded-pbe-password
    message: PBEKeySpec password from string literal
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          new PBEKeySpec("...".toCharArray(), ...)
      - pattern: |
          new PBEKeySpec($P, ...)
    metadata:
      cwe: CWE-259
      subtype: hardcoded-password
      confidence: medium
