id: java-hardcoded-secrets
name: Java Hardcoded Secrets
version: "1.0.0"
language: java
cwe:
  - CWE-798
  - CWE-259
  - CWE-321
owasp:
  - A07:2021-Identification and Authentication Failures
  - A02:2021-Cryptographic Failures
maturity: 3
description: >
  Detect hardcoded API keys, passwords, private keys, JWT secrets, database
  credentials, and cloud access keys in Java source and yml/properties config.

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-hardcoded-secrets-sinks.yaml
      - java-hardcoded-secrets-patterns.yaml
    codeql:
      - java-hardcoded-secrets.ql
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
    - case-003
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - codeql
  - llm

frameworks_supported:
  - spring-config
  - jdbc
  - aws-sdk
