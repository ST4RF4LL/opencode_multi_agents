id: java-hardcoded-secrets
name: Hardcoded Secrets
language: java
cwe:
  - CWE-798
  - CWE-259
  - CWE-321
owasp:
  - A07:2021-Identification and Authentication Failures
  - A02:2021-Cryptographic Failures
objective:
  detect: >
    Secret material (API keys, passwords, private keys, JWT/HMAC secrets,
    database credentials, cloud access keys) embedded as plaintext literals
    or reversible values in Java source, resources, or configuration such that
    repository or artifact access yields usable credentials.
core_condition:
  - secret_material_is_present_in_source_or_config
  - material_matches_secret_shape_or_sensitive_binding
  - usage_is_security_or_auth_sensitive
  - effective_secret_management_or_placeholder_control_is_missing
not_in_scope:
  - weak_algorithm_or_mode_without_hardcoded_secret_material
  - insecure_random_generation_without_embedded_secret
  - pure_tls_cipher_suite_misconfiguration
  - authorization_logic_flaws_without_credential_leak
  - logging_of_runtime_secrets_without_hardcode_in_repo
