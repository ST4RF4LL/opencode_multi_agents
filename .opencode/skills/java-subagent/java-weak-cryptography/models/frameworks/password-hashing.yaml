id: password-hashing
name: Password Hashing Libraries
detect:
  imports:
    - org.mindrot.jbcrypt
    - at.favre.lib.crypto.bcrypt
    - de.mkammerer.argon2
    - com.password4j
  keywords:
    - BCrypt
    - Argon2
    - SCrypt
    - PBKDF2
    - password4j

sources: inherit-global
sinks:
  - digest-as-password
  - password-encoder-weak
  - pbe-weak

safe_patterns:
  - bcrypt_cost_adequate
  - argon2id_with_memory_time_params
  - scrypt_with_adequate_N_r_p
  - pbkdf2_hmac_sha256_high_iterations_unique_salt

unsafe_patterns:
  - single_md5_sha1_sha256_of_password
  - fixed_global_salt
  - reversible_encryption_of_password
  - base64_or_plaintext_storage

notes:
  - Password storage is a distinct subtype from general MessageDigest use
