id: java-csrf
name: Java Cross-Site Request Forgery
version: "1.0.0"
language: java
cwe:
  - CWE-352
owasp:
  - A01:2021-Broken Access Control
dimension: D6
maturity: 3
description: >
  Detect state-changing endpoints that accept cookie-authenticated browser
  requests without effective CSRF defenses (token, SameSite, custom header,
  or equivalent origin-binding controls).

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-csrf-sinks.yaml
      - java-csrf-patterns.yaml
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
    - case-003
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - llm

frameworks_supported:
  - spring-security
  - servlet-session
  - spring-mvc
