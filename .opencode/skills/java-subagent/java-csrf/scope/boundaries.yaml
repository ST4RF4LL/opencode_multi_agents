adjacent_skills:
  - id: java-ssrf
    relation: app-initiated outbound fetch; not browser cross-site state change
  - id: java-open-redirect
    relation: browser Location only; may chain with CSRF but is separate class
  - id: java-missing-authorization
    relation: IDOR/authz failures; CSRF is cross-site with victim credentials
  - id: java-session-fixation
    relation: session lifecycle; may interact with CSRF token binding

