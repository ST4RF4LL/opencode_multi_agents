id: java-jwt-misuse
name: Java JWT/JOSE Misuse
version: "1.0.0"
language: java
cwe:
  - CWE-347
  - CWE-345
  - CWE-287
  - CWE-798
  - CWE-327
owasp:
  - A02:2021-Cryptographic Failures
  - A07:2021-Identification and Authentication Failures
maturity: 3
description: >
  Detect JWT/JOSE misuse in Java: alg=none acceptance, missing signature
  verification, weak/hardcoded HMAC secrets, algorithm confusion (RS to HS),
  and missing exp/aud/iss claim validation across jjwt, nimbus-jose-jwt,
  auth0 java-jwt, and Spring OAuth2 Resource Server.

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-jwt-misuse-sinks.yaml
      - java-jwt-misuse-patterns.yaml
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
    - case-003
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - llm

frameworks_supported:
  - jjwt
  - nimbus-jose
  - auth0-java-jwt
  - spring-oauth2-resource-server
