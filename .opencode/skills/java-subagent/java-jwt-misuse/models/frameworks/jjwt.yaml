id: jjwt
name: Java JWT (io.jsonwebtoken / jjwt)
detect:
  imports:
    - io.jsonwebtoken.Jwts
    - io.jsonwebtoken.JwtParser
    - io.jsonwebtoken.Claims
    - io.jsonwebtoken.security.Keys
    - io.jsonwebtoken.SignatureAlgorithm
  keywords:
    - Jwts.parser
    - Jwts.parserBuilder
    - parseClaimsJws
    - parseClaimsJwt
    - parseSignedClaims
    - parseUnsecuredClaims
    - setSigningKey
    - verifyWith
    - signWith
  maven:
    - io.jsonwebtoken:jjwt
    - io.jsonwebtoken:jjwt-api

sources: inherit-global
sinks:
  - jjwt-parse
  - jjwt-set-signing-key
  - claims-used-for-authz

safe_patterns:
  - parserBuilder_verifyWith_Keys_hmacShaKeyFor_managed_secret
  - parseSignedClaims_or_parseClaimsJws_only
  - require_expiration_and_audience_via_parser_or_manual_reject
  - SignatureAlgorithm_locked_server_side

unsafe_patterns:
  - parseClaimsJwt_or_parseUnsecuredClaims_for_auth
  - parser_without_signing_key_or_verifyWith
  - setSigningKey_string_literal_secret
  - SignatureAlgorithm_NONE
  - setSigningKey_with_public_key_bytes_for_hmac

version_notes:
  - jjwt_0_11_plus_prefers_parserBuilder_and_Keys
  - jjwt_0_12_plus_uses_verifyWith_and_parseSignedClaims
  - legacy_parser_setSigningKey_still_common

notes:
  - parseClaimsJwt is unsigned path - high risk if trusted
  - setAllowedClockSkewSeconds does not replace require exp
