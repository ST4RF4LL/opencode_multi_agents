finding_requirements:
  mandatory:
    - reachable_external_entry
    - attacker_controlled_input
    - credible_source_to_sink_path
    - xpath_expression_structure_is_influenced
    - effective_variable_binding_or_allowlist_missing_or_bypassable
  one_of:
    - dynamic_verification_success
    - complete_static_dataflow_with_clear_semantics
    - reproducible_behavioral_evidence
  context:
    recommended:
      - authentication_requirement
      - required_role
      - xml_document_source_if_known
      - affected_component
      - subtype_classification

reject_when:
  - xpath_is_constant_and_inputs_are_variable_bound_only
  - user_input_only_selects_from_fixed_expression_map
  - input_does_not_influence_xpath_structure
  - path_is_test_only_or_dead_code
  - validation_is_effective_and_complete
  - evidence_is_only_a_dangerous_api_match
  - evidence_is_only_xxe_configuration_without_xpath_structure_control

status_definitions:
  Candidate: dangerous pattern found but critical evidence incomplete
  Finding: Evidence Contract satisfied; formal report allowed
  Rejected: confirmed not a vulnerability with recorded reason
