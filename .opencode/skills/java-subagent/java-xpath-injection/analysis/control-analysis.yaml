questions:
  - id: xpath_template_origin
    ask: XPath 表达式是常量、安全变量模板，还是包含外部输入？
    outcomes:
      constant_or_bound_only: likely_safe
      user_in_structure: high_risk
      user_in_predicate_or_axis: structure_injection_risk

  - id: variable_binding
    ask: 用户输入是否仅通过 $var / XPathVariableResolver 传入？
    strong_yes:
      - compile("//book[@id=$bookId]") with setXPathVariableResolver
      - Saxon declared external variables with bound values
    false_friends:
      - compile("//book[@id='" + bookId + "']")
      - evaluate(String.format(...), doc)
      - quote escaping before concat

  - id: expression_fragment_handling
    ask: 路径片段/属性名如何处理？
    accept:
      - switch_or_map_to_constant_xpath_fragments
      - enum_allowlist
    reject_as_strong:
      - direct_concat_of_filter_param
      - regex_only_without_allowlist

  - id: second_order
    ask: 当前 XPath 片段是否来自历史存储的用户数据？
    if_yes:
      - treat_stored_value_as_untrusted_source
      - trace_original_write_path

  - id: xxe_confusion
    ask: 是否把 DocumentBuilder XXE 硬化误当成 XPath 注入修复？
    assessment: invalid_as_xpathi_control

  - id: encoding_and_escape
    ask: 是否依赖手工引号/特殊字符转义？
    assessment: weak_or_invalid_unless_proven_context_correct

control_grades:
  strong: effective_blocks_structure_control
  contextual: effective_only_for_specific_subtype
  weak: bypassable
  invalid: does_not_mitigate
