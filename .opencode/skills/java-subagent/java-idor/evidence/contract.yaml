finding_requirements:
  mandatory:
    - reachable_external_entry
    - attacker_controlled_object_id
    - credible_source_to_sink_path
    - resource_access_or_mutation_without_effective_object_authz
    - cross_user_or_cross_tenant_or_privilege_impact_plausible
  one_of:
    - dynamic_verification_success
    - complete_static_dataflow_with_clear_semantics
    - reproducible_behavioral_evidence
  context:
    recommended:
      - authentication_requirement
      - required_role
      - resource_type_and_sensitivity
      - ownership_model
      - tenant_model
      - affected_component
      - subtype_classification
      - parent_child_authorization_analysis_when_applicable

  parent_child_binding_requirements:
    applies_when: subtype_is_missing-parent-child-authorization-binding
    mandatory:
      - parent_resource_A_and_child_resource_B_are_named
      - evidence_that_B_depends_on_A_and_A_is_an_authorization_boundary
      - affected_B_operation_is_classified_as_create_read_update_delete_list_or_export
      - parent_identifier_origin_and_effective_parent_value_are_traced
      - evidence_of_missing_or_bypassable_authorization_on_A
      - evidence_that_B_to_A_membership_is_not_bound_on_the_server_path
    reject_only_when:
      - parent_authorization_and_B_to_A_membership_are_bound_for_the_operation
      - or_independent_B_policy_is_proven_equivalent_to_A_policy_and_relation_cannot_be_bypassed

reject_when:
  - object_id_not_attacker_controlled
  - server_only_scopes_to_current_user_without_foreign_id
  - ownership_or_tenant_query_binding_is_effective
  - path_is_test_only_or_dead_code
  - resource_is_intentionally_public_without_sensitive_boundary
  - evidence_is_only_a_findById_api_match
  - authentication_missing_is_confused_with_idor_without_object_id

status_definitions:
  Candidate: dangerous pattern found but critical evidence incomplete
  Finding: Evidence Contract satisfied; formal report allowed
  Rejected: confirmed not a vulnerability with recorded reason
