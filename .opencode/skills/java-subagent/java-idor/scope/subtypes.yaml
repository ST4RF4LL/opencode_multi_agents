subtypes:
  - id: horizontal-idor
    description: 同角色用户通过篡改对象 ID 访问其他用户的资源（水平越权）
    typical_patterns:
      - GET /orders/{id} without owner check
      - findById(orderId) then return without comparing currentUser

  - id: vertical-idor
    description: 低权限用户通过对象 ID 访问/操作仅管理员或更高角色应访问的对象
    typical_patterns:
      - DELETE /users/{id} without self-or-admin check
      - admin resource loaded by id for any authenticated user

  - id: missing-ownership-on-mutation
    description: 更新/删除操作使用请求中的 ID 且未校验资源归属
    typical_patterns:
      - repository.deleteById(id)
      - save(entity) after load by client id without owner match

  - id: tenant-id-from-client
    description: 多租户场景下 tenantId 由客户端提供，破坏租户隔离
    typical_patterns:
      - "@RequestParam Long tenantId used in query filter"
      - body.tenantId overrides server-derived tenant

  - id: predictable-id-enumeration
    description: 可预测的顺序 ID 结合缺失对象级校验导致可枚举他人资源
    typical_patterns:
      - sequential Long id in path
      - UUID not required if authz missing; sequential raises exploitability

  - id: missing-parent-child-authorization-binding
    description: 子资源 B 在设计上依赖父资源 A，但 B 的 CRUD/list/export 未同时校验调用者对 A 的权限和 B→A 归属，导致跨父资源读取、修改、删除、创建或枚举。
    typical_patterns:
      - GET /projects/{projectId}/issues/{issueId} loads issue by issueId without verifying issue.projectId == projectId and authorization on projectId
      - DELETE /accounts/{accountId}/documents/{documentId} authorizes document role or authentication but not account ownership and document.accountId
      - POST /projects/{projectId}/members accepts a body parentId or persists child with client-controlled projectId without authorizing the effective parent
      - async/export/cache/queue operation uses childId without propagating or verifying the authorized parent scope
