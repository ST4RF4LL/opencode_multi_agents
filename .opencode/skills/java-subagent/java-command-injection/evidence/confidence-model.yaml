levels:
  high:
    requires:
      - clear_source_to_sink_path
      - clear_shell_or_command_arg_influence
      - missing_or_weak_controls
      - one_of_strong_dynamic_or_unambiguous_static_semantics
  medium:
    requires:
      - source_to_sink_path
      - likely_command_influence
      - controls_absent_or_suspicious
    missing_optional:
      - dynamic_verification
  low:
    requires:
      - sink_and_possible_input_adjacency
    notes: usually Candidate only

modifiers:
  increase:
    - unauthenticated
    - shell_wrapper
    - privileged_execution
    - confirmed_command_side_effect
  decrease:
    - partial_allowlist
    - list_form_without_shell_uncertain_arg_impact
    - uncertain_reachability
