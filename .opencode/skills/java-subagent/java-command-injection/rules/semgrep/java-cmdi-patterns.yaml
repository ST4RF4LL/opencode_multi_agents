rules:
  - id: java-cmdi-runtime-exec-concat
    message: Runtime.exec with string concatenation/format may allow OS command injection
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          Runtime.getRuntime().exec($CMD + $X)
      - pattern: |
          Runtime.getRuntime().exec(String.format(...))
      - pattern: |
          $RT.exec($CMD + $X)
      - pattern: |
          $RT.exec(String.format(...))
    metadata:
      cwe: CWE-78
      subtype: runtime-exec-concat
      confidence: high

  - id: java-cmdi-processbuilder-shell-c
    message: ProcessBuilder invokes shell with -c /c; user-controlled string is high risk
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          new ProcessBuilder("sh", "-c", $X)
      - pattern: |
          new ProcessBuilder("/bin/sh", "-c", $X)
      - pattern: |
          new ProcessBuilder("bash", "-c", $X)
      - pattern: |
          new ProcessBuilder("cmd.exe", "/c", $X)
      - pattern: |
          new ProcessBuilder("cmd", "/c", $X)
      - pattern: |
          new ProcessBuilder(...).command("sh", "-c", $X)
      - pattern: |
          new ProcessBuilder(...).command("/bin/sh", "-c", $X)
      - pattern: |
          new ProcessBuilder(...).command("cmd.exe", "/c", $X)
    metadata:
      cwe: CWE-78
      subtype: processbuilder-shell-wrapper
      confidence: high

  - id: java-cmdi-runtime-exec-shell-array
    message: Runtime.exec shell array form with dynamic -c argument
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: |
          Runtime.getRuntime().exec(new String[] {"sh", "-c", $X})
      - pattern: |
          Runtime.getRuntime().exec(new String[] {"/bin/sh", "-c", $X})
      - pattern: |
          Runtime.getRuntime().exec(new String[] {"cmd.exe", "/c", $X})
      - pattern: |
          $RT.exec(new String[] {"/bin/sh", "-c", $X})
    metadata:
      cwe: CWE-78
      subtype: processbuilder-shell-wrapper
      confidence: high

  - id: java-cmdi-commons-exec-parse
    message: Commons Exec CommandLine.parse on non-constant string is high risk
    severity: WARNING
    languages: [java]
    pattern-either:
      - pattern: |
          CommandLine.parse($X)
      - pattern: |
          org.apache.commons.exec.CommandLine.parse($X)
    metadata:
      cwe: CWE-78
      subtype: commons-exec-string
      confidence: medium
      notes: Confirm whether $X is user-controlled

  - id: java-cmdi-processbuilder-user-command
    message: ProcessBuilder may use user-controlled command tokens
    severity: WARNING
    languages: [java]
    pattern-either:
      - pattern: |
          new ProcessBuilder($CMD)
      - pattern: |
          new ProcessBuilder($CMD, $ARG)
      - pattern: |
          new ProcessBuilder($LIST)
    metadata:
      cwe: CWE-78
      subtype: command-name-control
      confidence: low
      notes: Sink candidate only; require dataflow and shell/arg analysis
