  - balance_or_credit_changed_beyond_allowed_business_rules
  - ownerId_or_tenantId_rewritten
  - subsequent_request_gains_admin_functionality
  - persisted_entity_diff_includes_overposted_fields

notes:
  - derive_tests_from_actual_route_and_bound_type
  - do_not_blindly_reuse_historical_payloads
  - use_minimal_field_overpost_proof_not_full_account_takeover_scripts
  - prefer_staging_or_lab_with_test_accounts
