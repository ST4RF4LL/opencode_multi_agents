steps:
  - identify_reachable_entry
  - determine_binding_mechanism
  - determine_bound_type_and_sensitive_fields
  - inspect_serialization_and_binder_controls
  - inspect_transfer_to_entity_and_persistence
  - determine_caller_privilege_vs_target_fields
  - identify_observable_behavior
  - generate_target_specific_test
  - execute_baseline_request
  - execute_overpost_request
  - compare_results
  - preserve_evidence

influence_surfaces:
  - form_parameter_name_matching_sensitive_property
  - json_property_matching_sensitive_field
  - nested_json_path_roles_authorities
  - patch_op_path_to_sensitive_field
