id: java-mass-assignment
name: Java Mass Assignment / Over-Posting
version: "1.0.0"
language: java
cwe:
  - CWE-915
owasp:
  - A04:2021-Insecure Design
  - A08:2021-Software and Data Integrity Failures
dimension: D4
maturity: 3
description: >
  Detect attacker-controlled HTTP/JSON fields binding onto domain entity
  sensitive properties (privilege, role, balance, ownership, status) without
  effective field allowlisting, DTO isolation, or serialization access control.

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-mass-assignment-sinks.yaml
      - java-mass-assignment-patterns.yaml
    codeql:
      - java-mass-assignment.ql
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
    - case-003
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - codeql
  - llm

frameworks_supported:
  - spring-mvc
  - jackson
  - spring-data-rest
