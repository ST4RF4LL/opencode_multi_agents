id: java-deserialization
name: Java Unsafe Deserialization
version: "1.0.0"
language: java
cwe:
  - CWE-502
owasp:
  - A08:2021-Software and Data Integrity Failures
dimension: D4
maturity: 3
description: >
  Detect untrusted data reaching deserialization or polymorphic object
  reconstruction sinks without type allowlisting, ObjectInputFilter,
  SafeConstructor, or equivalent effective controls.

components:
  scope:
    - definition.yaml
    - subtypes.yaml
    - boundaries.yaml
  models:
    - sources.yaml
    - sinks.yaml
    - sanitizers.yaml
    - propagators.yaml
    - frameworks/
  rules:
    joern:
      - locate-sinks.sc
      - locate-sources.sc
      - source-to-sink.sc
      - trace-callers.sc
      - detect-validation.sc
    semgrep:
      - java-deserialization-sinks.yaml
      - java-deserialization-patterns.yaml
    grep:
      - keywords.yaml
  analysis:
    - candidate-triage.yaml
    - control-analysis.yaml
    - false-positive-patterns.yaml
    - decision-tree.yaml
  validation:
    - playbook.yaml
    - evidence-signals.yaml
    - generation-constraints.yaml
    - safety-boundaries.yaml
  evidence:
    - contract.yaml
    - confidence-model.yaml
    - finding-schema.yaml
  cases:
    - case-001
    - case-002
    - case-003
    - case-004
  tests:
    - positive/
    - negative/
    - regression/
    - expected-results.yaml

tool_priority:
  - rg
  - semgrep
  - joern
  - llm

frameworks_supported:
  - java-native
  - fastjson
  - jackson
  - snakeyaml
  - xstream
  - hessian-kryo
