boundary_notes:
  - Log4Shell pure JNDI in log message → adjacent (future java-jndi-injection); mark boundary, do not claim as this skill finding unless deserial path exists
  - commons-collections / commons-beanutils / c3p0 on classpath amplify risk but are not automatic findings alone
  - Jackson without enableDefaultTyping / activateDefaultTyping and without attacker-influenced @JsonTypeInfo is typically safe for closed DTO graphs
  - SnakeYAML new Yaml(new SafeConstructor()) or LoaderOptions TagInspector allowlist is a strong control when correctly applied
  - dangerous API hit alone is not a vulnerability
  - gadget chain presence without untrusted input path is not a finding
